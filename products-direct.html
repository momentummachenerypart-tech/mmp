            padding: 20px;
        }

            background: white;
            padding: 20px;
            border-radius: 8px;

        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            color: white;
            border-radius: 8px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .search-box {
            margin: 20px 0;
            padding: 20px;
            background: #e3f2fd;
            border-radius: 8px;
            text-align: center;
        }
        
        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #2196f3;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        .quick-btn {
            padding: 10px 20px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .quick-btn:hover {
            background: #1976d2;
        }
        
        .category-section {
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 5px solid #2196f3;
        }
        
        .category-title {
            font-size: 1.8rem;
            color: #1a365d;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2196f3;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .product-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .product-model {
            font-size: 1.3rem;
            font-weight: bold;
            color: #1a365d;
            margin-bottom: 10px;
        }
        
        .product-specs {
            margin: 15px 0;
        }
        
        .spec-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        
        .spec-label {
            font-weight: bold;
            color: #555;
        }
        
        .spec-value {
            color: #333;
        }
        
        .hidden {
            display: none;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.2rem;
        }
        
        .stats {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #e8f5e8;
            border-radius: 8px;
        }
    </style>

        // Display products
        function displayProducts(products) {
            const container = document.getElementById('allProducts');
            const stats = document.getElementById('stats');
            
            stats.textContent = `Menampilkan ${products.length} dari ${allProducts.length} produk`;
            
            if (products.length === 0) {
                container.innerHTML = '<div class="no-results">Tidak ada produk yang ditemukan</div>';
                return;
            }
            
            // Group by category
            const grouped = {};
            products.forEach(product => {
                if (!grouped[product.category]) {
                    grouped[product.category] = [];
                }
                grouped[product.category].push(product);
            });
            
            let html = '';
            Object.keys(grouped).forEach(categoryName => {
                html += `
                    <div class="category-section">
                        <h2 class="category-title">${categoryName} (${grouped[categoryName].length} produk)</h2>
                        <div class="products-grid">
                `;
                
                grouped[categoryName].forEach(product => {
                    html += createProductCard(product);
                });
                
                html += `
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Create product card
        function createProductCard(product) {
            return `
                <div class="product-card">
                    <div class="product-model">${product.model}</div>
                    <div class="product-specs">
                        <div class="spec-row">
                            <span class="spec-label">Kategori:</span>
                            <span class="spec-value">${product.category}</span>
                        </div>
                        <div class="spec-row">
                            <span class="spec-label">Bore Range:</span>
                            <span class="spec-value">${product.boreRange}</span>
                        </div>
                        <div class="spec-row">
                            <span class="spec-label">Max Torque:</span>
                            <span class="spec-value">${product.maxTorqueNm ? product.maxTorqueNm.toLocaleString() + ' Nm' : 'N/A'}</span>
                        </div>
                        <div class="spec-row">
                            <span class="spec-label">Max RPM:</span>
                            <span class="spec-value">${product.maxRPM ? product.maxRPM.toLocaleString() + ' RPM' : 'N/A'}</span>
                        </div>
                        <div class="spec-row">
                            <span class="spec-label">Catalog:</span>
                            <span class="spec-value">${product.catalogNumber}</span>
                        </div>
                        <div class="spec-row">
                            <span class="spec-label">Aplikasi:</span>
                            <span class="spec-value">${product.applications.slice(0, 2).join(', ')}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Perform search
        function performSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!searchTerm) {
                displayProducts(allProducts);
                return;
            }
            
            console.log('Searching for:', searchTerm);
            
            const filtered = allProducts.filter(product => {
                // Create comprehensive searchable text
                const searchableText = [
                    product.model.toLowerCase(),
                    product.category.toLowerCase(),
                    product.catalogNumber.toLowerCase(),
                    (product.applications || []).join(' ').toLowerCase(),
                    (product.features || []).join(' ').toLowerCase()
                ].join(' ');
                
                console.log('Product:', product.model, 'Searchable text:', searchableText);
                
                // Check if search term is found
                const found = searchableText.includes(searchTerm);
                console.log('Found:', found, 'for', product.model);
                
                return found;
            });
            
            console.log('Filtered products:', filtered.length);
            displayProducts(filtered);
        }

        // Quick search
        function quickSearch(term) {
            document.getElementById('searchInput').value = term;
            performSearch();
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            displayProducts(allProducts);
        });
    </script>
