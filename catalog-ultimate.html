            {model: "LTG Tube", cat: "Long-Term Grease", bore: "N/A", torque: "N/A", rpm: "N/A", apps: ["Field maintenance", "Spot lubrication", "Emergency repairs", "Service calls", "Gear couplings", "Industrial"]}
        ];

        function doSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            displayCatalog(term);
        }

        function quickSearch(term) {
            document.getElementById('searchInput').value = term;
            displayCatalog(term);
        }

        function displayCatalog(searchTerm = '') {
            const catalogDiv = document.getElementById('catalog');
            const statsDiv = document.getElementById('stats');
            
            let filtered = catalog;
            
            if (searchTerm) {
                filtered = catalog.filter(item => {
                    const searchable = (item.model + ' ' + item.cat + ' ' + item.apps.join(' ')).toLowerCase();
                    return searchable.includes(searchTerm);
                });
            }
            
            statsDiv.innerHTML = `Menampilkan ${filtered.length} dari ${catalog.length} produk${searchTerm ? ' untuk: "' + searchTerm + '"' : ''}`;
            
            // Group by category
            const grouped = {};
            filtered.forEach(item => {
                if (!grouped[item.cat]) grouped[item.cat] = [];
                grouped[item.cat].push(item);
            });
            
            let html = '';
            Object.keys(grouped).forEach(cat => {
                html += `<div class="category">`;
                html += `<h2>${cat} (${grouped[cat].length} produk)</h2>`;
                grouped[cat].forEach(item => {
                    html += `<div class="product">`;
                    html += `<div class="model">${item.model}</div>`;
                    html += `<div class="specs">`;
                    html += `<div class="spec-row"><span class="label">Bore:</span><span class="value">${item.bore}</span></div>`;
                    html += `<div class="spec-row"><span class="label">Torque:</span><span class="value">${item.torque}</span></div>`;
                    html += `<div class="spec-row"><span class="label">RPM:</span><span class="value">${item.rpm}</span></div>`;
                    html += `<div class="spec-row"><span class="label">Aplikasi:</span><span class="value">${item.apps.slice(0, 3).join(', ')}</span></div>`;
                    html += `</div>`;
                    html += `</div>`;
                });
                html += `</div>`;
            });
            
            catalogDiv.innerHTML = html;
        }

        // Initial display
        displayCatalog();
    </script>
